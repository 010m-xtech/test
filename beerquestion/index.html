<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ビール体験アプリ</title>
    <style>
        body { font-family: sans-serif; background: #fff8e1; text-align: center; padding: 20px; color: #333; }
        .container { background: white; padding: 20px; border-radius: 15px; max-width: 450px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .q-title { font-weight: bold; margin-top: 20px; display: block; text-align: left; }
        label { display: block; text-align: left; margin: 8px 0; cursor: pointer; }
        textarea { width: 95%; height: 60px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; padding: 5px; }
        video { width: 100%; border-radius: 10px; margin-top: 15px; background: #000; }
        button { width: 100%; padding: 15px; margin-top: 20px; background: #ffc107; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        button:disabled { background: #ccc; }
        .btn-group { display: flex; justify-content: space-around; margin-top: 20px; }
        .janken-btn { width: 30%; font-size: 2em; padding: 10px; background: #ff9800; }
        .status-box { background: #fef3c7; padding: 15px; border-radius: 10px; margin: 20px 0; }
        .count { font-size: 2.5em; font-weight: bold; color: #d32f2f; }
        #coupon { margin-top: 20px; padding: 20px; border: 3px dashed #ff5722; border-radius: 10px; background: #fff5f2; }
    </style>
</head>
<body>

<div class="container">
    <div id="step-survey">
        <h2>🍺 生ビールアンケート</h2>
        <span class="q-title">1. 当店の生ビールは何点ですか？</span>
        <select id="score" style="width: 100%; padding: 10px; margin-top:10px;">
            <option value="5">5点（最高！）</option>
            <option value="4">4点</option>
            <option value="3">3点</option>
            <option value="2">2点</option>
            <option value="1">1点</option>
        </select>

        <span class="q-title">2. こだわりを感じますか？（複数選択）</span>
        <label><input type="checkbox" id="check1"> クリーミーな泡</label>
        <label><input type="checkbox" id="check2"> なめらかな口当たり</label>
        <label><input type="checkbox" id="check3"> 雑味のない味わい</label>
        <label><input type="checkbox" id="check4"> 液：泡＝7：3</label>
        <label><input type="checkbox" id="check5"> こだわりを感じる</label>

        <span class="q-title">3. 飲んだ感想を教えてください</span>
        <textarea id="comment" placeholder="感想をお聞かせください"></textarea>

        <button id="sendBtn" onclick="submitToGas()">送信してゲームに進む</button>
    </div>

    <div id="step-video" class="hidden">
        <h2>こだわりを見てから挑戦！</h2>
        <video id="myVideo" src="https://010m-xtech.github.io/mymovie/NoLang_test20260422.mp4" playsinline muted></video>
        <p id="video-msg">動画を最後まで見てね...</p>
        <button id="toGameBtn" class="hidden" onclick="showJanken()">いよいよじゃんけんへ！</button>
    </div>

    <div id="step-janken" class="hidden">
        <h2>🍺 ビール争奪戦 🍺</h2>
        <p>3連勝で1杯無料！<br><small>※あいこ・負けは即終了</small></p>

        <div class="status-box">
            <div>現在の連勝数</div>
            <div class="count" id="combo">0</div>
        </div>

        <div id="display" style="margin: 15px 0; font-weight: bold; min-height: 1.2em;">出す手を選んで！</div>

        <div class="btn-group" id="controls">
            <button class="janken-btn" onclick="play('グー')">✊</button>
            <button class="janken-btn" onclick="play('チョキ')">✌️</button>
            <button class="janken-btn" onclick="play('パー')">🖐️</button>
        </div>

        <div id="coupon" class="hidden">
            <h3 style="color: #ff5722; margin: 0;">🎊 おめでとう！ 🎊</h3>
            <p style="font-size: 20px; font-weight: bold; margin: 10px 0;">生ビール1杯無料券</p>
            <p style="font-size: 12px;">店員さんにこの画面を見せてね！</p>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const shopName = urlParams.get('shop') || "不明な店舗";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyeRoy4HWhor9OiAY-Mq0b7I0fJ7PyDmPyZ-gcC5eZad6PwYDjeyOy5tmYMwtwrvF4P/exec";
    let winCount = 0;

    // アンケート送信
    async function submitToGas() {
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.innerText = "送信中...";

        const data = {
            shop: shopName,
            score: document.getElementById('score').value,
            comment: document.getElementById('comment').value,
            p1: document.getElementById('check1').checked,
            p2: document.getElementById('check2').checked,
            p3: document.getElementById('check3').checked,
            p4: document.getElementById('check4').checked,
            p5: document.getElementById('check5').checked,
            gameResult: "アンケート完了"
        };

        try {
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
            document.getElementById('step-survey').classList.add('hidden');
            document.getElementById('step-video').classList.remove('hidden');
            const v = document.getElementById('myVideo');
            v.play();
            v.onended = () => {
                document.getElementById('video-msg').innerText = "お待たせしました！";
                document.getElementById('toGameBtn').classList.remove('hidden');
            };
        } catch (e) {
            alert("送信失敗。ネット環境を確認してください。");
            btn.disabled = false;
        }
    }

    // じゃんけん結果送信
    async function sendFinalResult(resultText) {
        const data = { shop: shopName, gameResult: resultText };
        try {
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
        } catch (e) { console.log("結果送信失敗"); }
    }

    function showJanken() {
        document.getElementById('step-video').classList.add('hidden');
        document.getElementById('step-janken').classList.remove('hidden');
    }

    function play(userHand) {
        const hands = ['グー', 'チョキ', 'パー'];
        const cpHand = hands[Math.floor(Math.random() * 3)];
        const display = document.getElementById('display');
        const comboDisp = document.getElementById('combo');
        const controls = document.getElementById('controls');

        if ((userHand === 'グー' && cpHand === 'チョキ') || (userHand === 'チョキ' && cpHand === 'パー') || (userHand === 'パー' && cpHand === 'グー')) {
            winCount++;
            comboDisp.innerText = winCount;
            if (winCount === 3) {
                display.innerHTML = "<span style='color:red;'>3連勝！おめでとう！</span>";
                controls.classList.add('hidden');
                document.getElementById('coupon').classList.remove('hidden');
                sendFinalResult("★祝・3連勝達成★");
            } else {
                display.innerText = `勝ち！相手は${cpHand}。あと${3 - winCount}回！`;
                display.style.color = "blue";
            }
        } else {
            let reason = (userHand === cpHand) ? "あいこ" : "負け";
            display.innerText = `${reason}（相手は${cpHand}）。また挑戦してくださいね！`;
            display.style.color = "red";
            controls.classList.add('hidden'); // 終了なのでボタンを隠す
            sendFinalResult(`${winCount}回勝って${reason}終了`);
        }
    }
</script>
</body>
</html>
