<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生ビールアンケート</title>
    <style>
        body { font-family: sans-serif; background: #fff8e1; text-align: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; max-width: 450px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        video { width: 100%; border-radius: 10px; margin-top: 15px; }
        button { width: 100%; padding: 15px; margin-top: 20px; background: #ffc107; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        .janken-btn { width: 30%; margin: 5px; background: #ff9800; }
    </style>
</head>
<body>

<div class="container">
    <div id="step-survey">
        <h2>🍺 生ビールアンケート</h2>
        <p>回答してゲームに挑戦！</p>
        <select id="score" style="width: 100%; padding: 10px;">
            <option value="5">5点（最高！）</option>
            <option value="4">4点</option>
            <option value="3">3点</option>
        </select>
        <button onclick="submitToGas()">回答を送信して次へ</button>
    </div>

    <div id="step-video" class="hidden">
        <h2>こだわりを見てから挑戦！</h2>
        <video id="myVideo" src="https://010m-xtech.github.io/mymovie/NoLang_test20260422.mp4" playsinline></video>
        <p id="video-msg">動画を最後まで見てね...</p>
        <button id="toGameBtn" class="hidden" onclick="showJanken()">いよいよじゃんけんへ！</button>
    </div>

    <div id="step-janken" class="hidden">
        <h2>運命の3連勝チャレンジ！</h2>
        <p>現在：<span id="winCount">0</span>回勝利中</p>
        <button class="janken-btn" onclick="play('グー')">✊</button>
        <button class="janken-btn" onclick="play('チョキ')">✌️</button>
        <button class="janken-btn" onclick="play('パー')">🖐️</button>
        <p id="janken-result"></p>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyeRoy4HWhor9OiAY-Mq0b7I0fJ7PyDmPyZ-gcC5eZad6PwYDjeyOy5tmYMwtwrvF4P/exec";
    let winCount = 0;

    // 1. アンケート送信
    async function submitToGas() {
        const score = document.getElementById('score').value;
        // 本来はfetchで送信しますが、確認用にすぐ切り替えます
        console.log("送信スコア:", score);
        
        document.getElementById('step-survey').classList.add('hidden');
        document.getElementById('step-video').classList.remove('hidden');
        
        // 動画を自動再生（ブラウザ制限でミュートが必要な場合あり）
        const v = document.getElementById('myVideo');
        v.play();

        // 動画が終了した時の処理
        v.onended = function() {
            document.getElementById('video-msg').innerText = "お待たせしました！";
            document.getElementById('toGameBtn').classList.remove('hidden');
        };
    }

    // 2. じゃんけん画面へ
    function showJanken() {
        document.getElementById('step-video').classList.add('hidden');
        document.getElementById('step-janken').classList.remove('hidden');
    }

    // 3. じゃんけんロジック（そのまま）
    function play(userHand) {
        const hands = ['グー', 'チョキ', 'パー'];
        const cpHand = hands[Math.floor(Math.random() * 3)];
        const resDiv = document.getElementById('janken-result');
        
        if (userHand === cpHand) {
            resDiv.innerText = `あいこ！（相手も${cpHand}）`;
        } else if (
            (userHand === 'グー' && cpHand === 'チョキ') ||
            (userHand === 'チョキ' && cpHand === 'パー') ||
            (userHand === 'パー' && cpHand === 'グー')
        ) {
            winCount++;
            document.getElementById('winCount').innerText = winCount;
            if (winCount === 3) {
                resDiv.innerHTML = "<h1 style='color:red;'>3連勝！ビール無料券獲得！</h1>";
            } else {
                resDiv.innerText = `勝ち！次は${winCount + 1}回目です（相手は${cpHand}）`;
            }
        } else {
            winCount = 0;
            document.getElementById('winCount').innerText = winCount;
            resDiv.innerText = `負け... 0回からやり直し（相手は${cpHand}）`;
        }
    }
</script>

</body>
</html>
